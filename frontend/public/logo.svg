<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Energy rays radiating outward -->
  <g fill="#7CB342">
    <!-- Top rays -->
    <polygon points="100,15 96,35 104,35"/>
    <polygon points="120,22 114,38 126,32"/>
    <polygon points="135,35 127,48 141,45"/>
    <polygon points="145,55 135,63 148,70"/>
    
    <!-- Right rays -->
    <polygon points="165,95 145,91 150,103"/>
    <polygon points="170,125 148,120 153,135"/>
    <polygon points="160,150 138,148 145,160"/>
    <polygon points="145,170 120,160 128,175"/>
    
    <!-- Bottom rays -->
    <polygon points="100,185 104,165 96,165"/>
    <polygon points="80,178 86,162 74,168"/>
    <polygon points="65,165 73,152 59,155"/>
    <polygon points="55,145 65,137 52,130"/>
    
    <!-- Left rays -->
    <polygon points="35,105 55,109 50,97"/>
    <polygon points="30,75 52,80 47,65"/>
    <polygon points="40,50 62,52 55,40"/>
    <polygon points="55,30 75,40 72,25"/>
  </g>
  
  <!-- Main meditation figure -->
  <g fill="#7CB342">
    <!-- Head -->
    <circle cx="100" cy="60" r="12"/>
    
    <!-- Neck/upper body -->
    <ellipse cx="100" cy="82" rx="10" ry="12"/>
    
    <!-- Main body -->
    <ellipse cx="100" cy="105" rx="20" ry="25"/>
    
    <!-- Left arm -->
    <path d="M 85 90 Q 70 95 65 110 Q 63 120 68 125" fill="#7CB342" stroke="none"/>
    <circle cx="65" cy="110" r="4"/>
    
    <!-- Right arm -->
    <path d="M 115 90 Q 130 95 135 110 Q 137 120 132 125" fill="#7CB342" stroke="none"/>
    <circle cx="135" cy="110" r="4"/>
    
    <!-- Left leg -->
    <ellipse cx="88" cy="130" rx="8" ry="15"/>
    <ellipse cx="88" cy="152" rx="10" ry="6"/>
    
    <!-- Right leg -->
    <ellipse cx="112" cy="130" rx="8" ry="15"/>
    <ellipse cx="112" cy="152" rx="10" ry="6"/>
  </g>
</svg>